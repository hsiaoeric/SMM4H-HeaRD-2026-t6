# TNM staging training config — BioClinical-ModernBERT + CE heads
seed: 0
data:
  data_dir: data
  max_length: 4096     # BioClinical-ModernBERT supports 8192; 4096 covers 99%+ of samples
  val_size: 0.15
  batch_size: 8
  eval_batch_size: 32
  grad_accum_steps: 1

model:
  encoder_name: "thomas-sounack/BioClinical-ModernBERT-base"
  head_type: ce        # "ce" or "coral"
  t_num_labels: 4      # T1-T4
  n_num_labels: 4      # N0-N3
  m_num_labels: 2      # M0-M1

training:
  num_epochs: 5
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  metric_for_best: f1_macro_avg
  greater_is_better: true

output:
  output_dir: outputs
  run_name: tnm_modernbert_ce

